name: Daily Scrape

on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = JST 6:00
    - cron: '0 23 * * *'   # UTC 23:00 = JST 8:00
    - cron: '30 0 * * *'   # UTC 00:30 = JST 9:30
    - cron: '0 3 * * *'    # UTC 03:00 = JST 12:00
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scrape
        run: python scrape_juggler.py

      - name: Run compute
        run: python compute.py

      - name: Push data.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add data.json raw_data.csv store_freshness.json
          git diff --cached --quiet || git commit -m "auto: update data.json $(date +'%Y-%m-%d')"
          git push
