name: Daily Scrape

on:
  workflow_dispatch:

concurrency:
  group: daily-scrape
  cancel-in-progress: false

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas

      - name: Run feedback
        run: python feedback.py

      - name: Run compute
        run: python compute.py

      - name: Run morning compute
        run: python morning_compute.py

      - name: Run candidate compute
        run: python candidate_compute.py

      - name: Push data.json
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add data.json morning_data.json candidate_data.json store_list.json feedback_data.json
          [ -f store_model_summary.csv ] && git add store_model_summary.csv || true
          [ -f store_freshness.json ] && git add store_freshness.json || true
          [ -f seat_data.json ] && git add seat_data.json || true
          git add seat_data_*.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "auto: update data.json $(date +'%Y-%m-%d')"
          git push
